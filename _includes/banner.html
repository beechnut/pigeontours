{% assign current_path = page | relative_url %}

{% for banner in site.data.banners %}
  {% if current_path == banner.path %}
    <div id="container28" class="container-component instance-28 style-4 default full screen">
      <div class="wrapper">
        <div class="inner" data-onvisible-trigger="1">
          <p id="text60" class="text-component instance-60 style-7">
            {{ banner.message }}
          </p>
        </div>
      </div>
    </div>
  {% endif %}
{% endfor %}
